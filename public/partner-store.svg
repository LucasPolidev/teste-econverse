<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background warm lighting -->
  <defs>
    <linearGradient id="storeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d3d3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="floorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background wall with warm lighting -->
  <rect width="800" height="600" fill="url(#storeGradient)" />

  <!-- Floor -->
  <ellipse cx="400" cy="550" rx="400" ry="80" fill="url(#floorGradient)" opacity="0.8" />

  <!-- Warning lights at top (Apple logo style) -->
  <circle cx="650" cy="80" r="40" fill="#f5f5f5" />
  <path d="M 640 50 Q 650 40 660 50 Q 665 65 660 75 Q 650 85 640 75 Q 635 65 640 50 Z" fill="#000" />

  <!-- Display sign/ceiling -->
  <rect x="580" y="20" width="180" height="60" fill="#1a1a1a" rx="8" />
  <text x="670" y="55" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">STORE</text>

  <!-- Left display shelf -->
  <rect x="50" y="150" width="150" height="280" fill="#2a2a2a" rx="8" opacity="0.9" />
  <rect x="60" y="160" width="130" height="20" fill="#4a4a4a" />
  <rect x="60" y="200" width="130" height="20" fill="#4a4a4a" />
  <rect x="60" y="240" width="130" height="20" fill="#4a4a4a" />
  <rect x="60" y="280" width="130" height="20" fill="#4a4a4a" />
  <rect x="60" y="320" width="130" height="20" fill="#4a4a4a" />
  <rect x="60" y="360" width="130" height="20" fill="#4a4a4a" />
  <rect x="60" y="400" width="130" height="20" fill="#4a4a4a" />

  <!-- Center display screen (large) -->
  <rect x="250" y="100" width="300" height="200" fill="#0a0a0a" rx="12" stroke="#888" stroke-width="2" />
  <rect x="260" y="110" width="280" height="180" fill="#1a3a5a" opacity="0.8" />
  <circle cx="400" cy="200" r="40" fill="#fff" opacity="0.3" />
  <text x="400" y="210" font-size="16" fill="#aaa" text-anchor="middle" opacity="0.6">DISPLAY</text>

  <!-- Right display shelf -->
  <rect x="600" y="150" width="150" height="280" fill="#2a2a2a" rx="8" opacity="0.9" />
  <rect x="610" y="160" width="130" height="20" fill="#4a4a4a" />
  <rect x="610" y="200" width="130" height="20" fill="#4a4a4a" />
  <rect x="610" y="240" width="130" height="20" fill="#4a4a4a" />
  <rect x="610" y="280" width="130" height="20" fill="#4a4a4a" />
  <rect x="610" y="320" width="130" height="20" fill="#4a4a4a" />
  <rect x="610" y="360" width="130" height="20" fill="#4a4a4a" />
  <rect x="610" y="400" width="130" height="20" fill="#4a4a4a" />

  <!-- Floor display stands -->
  <rect x="180" y="420" width="80" height="100" fill="#333" rx="4" />
  <rect x="290" y="420" width="60" height="100" fill="#333" rx="4" />
  <rect x="450" y="420" width="60" height="100" fill="#333" rx="4" />
  <rect x="560" y="420" width="80" height="100" fill="#333" rx="4" />

  <!-- Overhead lighting effects -->
  <circle cx="200" cy="80" r="60" fill="#d4a574" opacity="0.2" />
  <circle cx="600" cy="80" r="60" fill="#d4a574" opacity="0.2" />
  <circle cx="400" cy="60" r="50" fill="#e8c547" opacity="0.15" />

  <!-- Ambient highlights -->
  <ellipse cx="250" cy="480" rx="200" ry="40" fill="#fff" opacity="0.05" />
</svg>