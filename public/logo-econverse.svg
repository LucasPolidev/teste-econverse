<svg width="280" height="48" viewBox="0 0 280 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .econverse-badge-text { font-family: Arial, sans-serif; font-weight: 700; font-size: 20px; fill: white; }
      .econverse-brand-text { font-family: Arial, sans-serif; font-weight: 700; font-size: 32px; fill: #000000; }
    </style>
  </defs>
  
  <!-- Círculo amarelo -->
  <circle cx="24" cy="24" r="22" fill="#FFC107"/>
  
  <!-- Texto "ec" branco dentro do círculo -->
  <text x="24" y="32" text-anchor="middle" class="econverse-badge-text">ec</text>
  
  <!-- Texto "onverse" azul escuro -->
  <text x="50" y="36" class="econverse-brand-text">onverse</text>
</svg>
